version: '3.8'

services:
  # Development service with live reload
  jekyll-dev:
    build:
      context: .
      target: development
      dockerfile: Dockerfile
    container_name: jekyll-dev
    ports:
      - "4000:4000"
      - "35729:35729"  # LiveReload port
    volumes:
      # Mount source code for live editing
      - .:/srv/jekyll
      # Use named volume for gems to improve performance
      - bundle-cache:/usr/local/bundle
    environment:
      - JEKYLL_ENV=development
    command: bundle exec jekyll serve --host 0.0.0.0 --livereload --force_polling --incremental
    networks:
      - jekyll-network
    profiles:
      - dev

  # Production-ready service with nginx
  jekyll-prod:
    build:
      context: .
      target: production
      dockerfile: Dockerfile
    container_name: jekyll-prod
    ports:
      - "8080:80"
    restart: unless-stopped
    networks:
      - jekyll-network
    profiles:
      - prod
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Optional: nginx reverse proxy with SSL (for production deployment)
  nginx-proxy:
    image: nginx:1.25-alpine
    container_name: jekyll-nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      - jekyll-prod
    restart: unless-stopped
    networks:
      - jekyll-network
    profiles:
      - prod-proxy

volumes:
  bundle-cache:
    driver: local
  nginx-cache:
    driver: local

networks:
  jekyll-network:
    driver: bridge
