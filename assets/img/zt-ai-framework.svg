<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, Courier New, monospace">

  <!-- Background -->
  <rect width="800" height="480" fill="#0D1117"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="13" fill="#8B949E" letter-spacing="2">ZERO TRUST FOR AI — ENFORCEMENT LAYERS</text>

  <!-- Layer 4: Outermost — Identity & Access -->
  <rect x="40" y="60" width="720" height="380" rx="8" fill="none" stroke="#30363D" stroke-width="1.5"/>
  <text x="60" y="84" font-size="10" fill="#8B949E" letter-spacing="1.5">LAYER 4 // IDENTITY &amp; ACCESS CONTROL</text>

  <!-- Layer 3: Network -->
  <rect x="80" y="100" width="640" height="320" rx="6" fill="none" stroke="#30363D" stroke-width="1.5"/>
  <text x="100" y="122" font-size="10" fill="#8B949E" letter-spacing="1.5">LAYER 3 // NETWORK SEGMENTATION</text>

  <!-- Layer 2: Workload / Pipeline -->
  <rect x="120" y="138" width="560" height="260" rx="6" fill="none" stroke="#0EA5E9" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="140" y="160" font-size="10" fill="#0EA5E9" letter-spacing="1.5">LAYER 2 // WORKLOAD &amp; PIPELINE INTEGRITY</text>

  <!-- Layer 1: AI Core -->
  <rect x="180" y="176" width="440" height="196" rx="6" fill="#161B22" stroke="#00FF88" stroke-width="2"/>
  <text x="400" y="200" text-anchor="middle" font-size="10" fill="#00FF88" letter-spacing="1.5">LAYER 1 // AI MODEL &amp; AGENT TRUST BOUNDARY</text>

  <!-- AI Core content: three columns -->

  <!-- Column 1: Model -->
  <rect x="200" y="214" width="120" height="130" rx="4" fill="#1C2128" stroke="#30363D" stroke-width="1"/>
  <text x="260" y="234" text-anchor="middle" font-size="9" fill="#00FF88">MODEL</text>
  <text x="260" y="254" text-anchor="middle" font-size="8" fill="#8B949E">Provenance</text>
  <text x="260" y="270" text-anchor="middle" font-size="8" fill="#8B949E">Signing</text>
  <text x="260" y="286" text-anchor="middle" font-size="8" fill="#8B949E">Version Control</text>
  <text x="260" y="302" text-anchor="middle" font-size="8" fill="#8B949E">Attestation</text>
  <text x="260" y="318" text-anchor="middle" font-size="8" fill="#8B949E">Red-Team Records</text>

  <!-- Column 2: Agent -->
  <rect x="340" y="214" width="120" height="130" rx="4" fill="#1C2128" stroke="#30363D" stroke-width="1"/>
  <text x="400" y="234" text-anchor="middle" font-size="9" fill="#00FF88">AGENT</text>
  <text x="400" y="254" text-anchor="middle" font-size="8" fill="#8B949E">Least Privilege</text>
  <text x="400" y="270" text-anchor="middle" font-size="8" fill="#8B949E">Scoped Tokens</text>
  <text x="400" y="286" text-anchor="middle" font-size="8" fill="#8B949E">Action Logging</text>
  <text x="400" y="302" text-anchor="middle" font-size="8" fill="#8B949E">Human Approval</text>
  <text x="400" y="318" text-anchor="middle" font-size="8" fill="#8B949E">Blast Radius Limits</text>

  <!-- Column 3: Data -->
  <rect x="480" y="214" width="120" height="130" rx="4" fill="#1C2128" stroke="#30363D" stroke-width="1"/>
  <text x="540" y="234" text-anchor="middle" font-size="9" fill="#00FF88">DATA</text>
  <text x="540" y="254" text-anchor="middle" font-size="8" fill="#8B949E">Encrypted at Rest</text>
  <text x="540" y="270" text-anchor="middle" font-size="8" fill="#8B949E">Encrypted in Transit</text>
  <text x="540" y="286" text-anchor="middle" font-size="8" fill="#8B949E">Labeling / DLP</text>
  <text x="540" y="302" text-anchor="middle" font-size="8" fill="#8B949E">Lineage Tracking</text>
  <text x="540" y="318" text-anchor="middle" font-size="8" fill="#8B949E">Post-Quantum Ready</text>

  <!-- Connecting arrows between columns -->
  <line x1="320" y1="279" x2="340" y2="279" stroke="#30363D" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="460" y1="279" x2="480" y2="279" stroke="#30363D" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#30363D"/>
    </marker>
  </defs>

  <!-- Footer -->
  <text x="400" y="465" text-anchor="middle" font-size="9" fill="#30363D" letter-spacing="1">NEVER TRUST // ALWAYS VERIFY // ASSUME BREACH</text>

</svg>
