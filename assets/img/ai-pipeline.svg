<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="system-ui, -apple-system, 'Segoe UI', Arial, sans-serif">

  <defs>
    <marker id="aiarrow" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#8B5E3C"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="340" fill="#FDFAF6" rx="12"/>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" font-size="14" font-weight="700" fill="#3F3A32">AI-Agent-Aware CI/CD Pipeline</text>

  <!-- ── Two input sources ── -->

  <!-- Human Developer input (top-left) -->
  <rect x="18" y="65" width="130" height="62" rx="8" fill="#EFE7DD" stroke="#8B5E3C" stroke-width="1.5"/>
  <rect x="18" y="65" width="130" height="24" rx="8" fill="#8B5E3C"/>
  <rect x="18" y="79"  width="130" height="10" fill="#8B5E3C"/>
  <text x="83" y="81"  text-anchor="middle" font-size="10.5" font-weight="700" fill="#FFFFFF">Human Developer</text>
  <text x="83" y="101" text-anchor="middle" font-size="10"   fill="#3F3A32">Code · Reviews</text>
  <text x="83" y="117" text-anchor="middle" font-size="9.5"  fill="#6F4A2E">Intentional authorship</text>

  <!-- AI Agent input (bottom-left) — highlighted differently -->
  <rect x="18" y="145" width="130" height="62" rx="8" fill="#EFE7DD" stroke="#C4956A" stroke-width="2"/>
  <rect x="18" y="145" width="130" height="24" rx="8" fill="#C4956A"/>
  <rect x="18" y="159"  width="130" height="10" fill="#C4956A"/>
  <text x="83" y="161"  text-anchor="middle" font-size="10.5" font-weight="700" fill="#FFFFFF">AI Agent</text>
  <text x="83" y="181" text-anchor="middle" font-size="10"   fill="#3F3A32">Code · PRs · IaC</text>
  <text x="83" y="197" text-anchor="middle" font-size="9.5"  fill="#6F4A2E">Non-deterministic output</text>

  <!-- Merge arrow from both inputs to Git/PR box -->
  <line x1="148" y1="96"  x2="185" y2="135" stroke="#8B5E3C" stroke-width="1.8" marker-end="url(#aiarrow)"/>
  <line x1="148" y1="176" x2="185" y2="152" stroke="#C4956A" stroke-width="1.8" marker-end="url(#aiarrow)"/>

  <!-- ── Stage 1: Git / Pull Request ── -->
  <rect x="192" y="112" width="130" height="80" rx="8" fill="#EFE7DD" stroke="#8B5E3C" stroke-width="1.5"/>
  <rect x="192" y="112" width="130" height="26" rx="8" fill="#8B5E3C"/>
  <rect x="192" y="128" width="130" height="10" fill="#8B5E3C"/>
  <text x="257" y="130" text-anchor="middle" font-size="11"   font-weight="700" fill="#FFFFFF">Git / Pull Request</text>
  <text x="257" y="156" text-anchor="middle" font-size="10"   fill="#3F3A32">Immutable audit trail</text>
  <text x="257" y="172" text-anchor="middle" font-size="9.5"  fill="#6F4A2E">Signed commits · SLSA</text>
  <text x="257" y="185" text-anchor="middle" font-size="9.5"  fill="#6F4A2E">Provenance recorded</text>

  <!-- Arrow 1→2 -->
  <line x1="322" y1="152" x2="346" y2="152" stroke="#8B5E3C" stroke-width="2" marker-end="url(#aiarrow)"/>

  <!-- ── Stage 2: Standard CI ── -->
  <rect x="353" y="112" width="130" height="80" rx="8" fill="#EFE7DD" stroke="#8B5E3C" stroke-width="1.5"/>
  <rect x="353" y="112" width="130" height="26" rx="8" fill="#8B5E3C"/>
  <rect x="353" y="128" width="130" height="10" fill="#8B5E3C"/>
  <text x="418" y="130" text-anchor="middle" font-size="11"   font-weight="700" fill="#FFFFFF">Standard CI</text>
  <text x="418" y="156" text-anchor="middle" font-size="10"   fill="#3F3A32">Tests · Lint · Build</text>
  <text x="418" y="172" text-anchor="middle" font-size="9.5"  fill="#6F4A2E">SAST · Dependency scan</text>
  <text x="418" y="185" text-anchor="middle" font-size="9.5"  fill="#6F4A2E">Container image scan</text>

  <!-- Arrow 2→3 -->
  <line x1="483" y1="152" x2="507" y2="152" stroke="#8B5E3C" stroke-width="2" marker-end="url(#aiarrow)"/>

  <!-- ── Stage 3: AI Validation (highlighted — AI-specific gate) ── -->
  <rect x="514" y="104" width="130" height="96" rx="8" fill="#FDF6EE" stroke="#C4956A" stroke-width="2.5"/>
  <rect x="514" y="104" width="130" height="28" rx="8" fill="#C4956A"/>
  <rect x="514" y="122" width="130" height="10" fill="#C4956A"/>
  <text x="579" y="123" text-anchor="middle" font-size="11"   font-weight="700" fill="#FFFFFF">AI Validation</text>
  <!-- star badge -->
  <text x="638" y="110" font-size="9" fill="#FFFFFF" font-weight="700">★ NEW</text>
  <text x="579" y="149" text-anchor="middle" font-size="10"   fill="#3F3A32">Output provenance check</text>
  <text x="579" y="164" text-anchor="middle" font-size="9.5"  fill="#6F4A2E">Hallucination detection</text>
  <text x="579" y="178" text-anchor="middle" font-size="9.5"  fill="#6F4A2E">Prompt injection audit</text>
  <text x="579" y="192" text-anchor="middle" font-size="9.5"  fill="#6F4A2E">Policy gate (OPA)</text>

  <!-- Arrow 3→4 -->
  <line x1="644" y1="152" x2="668" y2="152" stroke="#8B5E3C" stroke-width="2" marker-end="url(#aiarrow)"/>

  <!-- ── Stage 4: Human Review + Deploy ── -->
  <rect x="675" y="112" width="108" height="80" rx="8" fill="#EFE7DD" stroke="#8B5E3C" stroke-width="1.5"/>
  <rect x="675" y="112" width="108" height="26" rx="8" fill="#3F3A32"/>
  <rect x="675" y="128" width="108" height="10" fill="#3F3A32"/>
  <text x="729" y="130" text-anchor="middle" font-size="11"   font-weight="700" fill="#FFFFFF">Human Review</text>
  <text x="729" y="156" text-anchor="middle" font-size="10"   fill="#3F3A32">Intent alignment</text>
  <text x="729" y="172" text-anchor="middle" font-size="9.5"  fill="#6F4A2E">Not "does it work?"</text>
  <text x="729" y="185" text-anchor="middle" font-size="9.5"  fill="#6F4A2E">but "should it exist?"</text>

  <!-- ── Legend ── -->
  <rect x="30" y="258" width="14" height="14" rx="3" fill="#8B5E3C"/>
  <text x="50" y="269" font-size="10.5" fill="#3F3A32">Standard pipeline stage</text>
  <rect x="200" y="258" width="14" height="14" rx="3" fill="#C4956A"/>
  <text x="220" y="269" font-size="10.5" fill="#3F3A32">AI-specific gate (new requirement)</text>
  <rect x="430" y="258" width="14" height="14" rx="3" fill="#3F3A32"/>
  <text x="450" y="269" font-size="10.5" fill="#3F3A32">Mandatory human checkpoint</text>

  <!-- Caption -->
  <text x="400" y="310" text-anchor="middle" font-size="11" fill="#A09080" font-style="italic">When AI agents commit code, the pipeline becomes the primary governance layer</text>

</svg>
